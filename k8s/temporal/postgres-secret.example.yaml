# ============================================================
# External Postgres for Temporal (e.g. Supabase — same instance as LANGGRAPH_POSTGRES_URL)
#
# Setup:
#   ./k8s/temporal/setup-postgres-secret.sh
#   # or manually copy this file to postgres-secret.yaml and edit
#   kubectl apply -f k8s/temporal/postgres-secret.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: memorang-temporal-postgres-secret
type: Opaque
stringData:
  POSTGRES_HOST: "db.REPLACE_ME.supabase.co"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "REPLACE_ME"
