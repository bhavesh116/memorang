apiVersion: apps/v1
kind: Deployment
metadata:
  name: memorang-frontend
  namespace: memorang
  labels:
    app: memorang-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memorang-frontend
  template:
    metadata:
      labels:
        app: memorang-frontend
    spec:
      imagePullSecrets:
        - name: acr-secret
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: memorang-frontend
          image: tickertom.azurecr.io/memorang-frontend:dev-ai
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: doppler-tokens
                  key: FRONTEND_DOPPLER_TOKEN
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
