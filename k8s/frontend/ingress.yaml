apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memorang-frontend
  namespace: memorang
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: app.memorang.io   # ← update with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memorang-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - app.memorang.io
      secretName: frontend-tls
