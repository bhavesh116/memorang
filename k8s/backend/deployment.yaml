apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: memorang
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Target arm64 nodes
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/memorang-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: FRONTEND_URL
              value: "https://app.memorang.io"   # ← update with your domain
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_STORAGE_CONNECTION_STRING
            - name: AZURE_STORAGE_PDF_CONTAINER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_STORAGE_PDF_CONTAINER
            - name: AZURE_STORAGE_IMAGE_CONTAINER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_STORAGE_IMAGE_CONTAINER
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_OPENAI_API_KEY
            - name: AZURE_OPENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_OPENAI_ENDPOINT
            - name: AZURE_OPENAI_API_VERSION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_OPENAI_API_VERSION
            - name: AZURE_OPENAI_DEPLOYMENT_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_OPENAI_DEPLOYMENT_NAME
            - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT_NAME
            - name: AZURE_DOCUMENT_INTELLIGENCE_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_KEY
            - name: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT
            - name: AZURE_DOCUMENT_INTELLIGENCE_API_VERSION
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: AZURE_DOCUMENT_INTELLIGENCE_API_VERSION
            - name: TEMPORAL_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TEMPORAL_ADDRESS
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TEMPORAL_NAMESPACE
            - name: TEMPORAL_TASK_QUEUE
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: TEMPORAL_TASK_QUEUE
            - name: LANGGRAPH_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LANGGRAPH_POSTGRES_URL
            - name: LANGGRAPH_POSTGRES_SCHEMA
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LANGGRAPH_POSTGRES_SCHEMA
            - name: LANGSMITH_TRACING
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LANGSMITH_TRACING
            - name: LANGSMITH_PROJECT
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LANGSMITH_PROJECT
            - name: LANGSMITH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: LANGSMITH_API_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
