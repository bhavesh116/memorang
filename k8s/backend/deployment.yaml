apiVersion: apps/v1
kind: Deployment
metadata:
  name: memorang-backend
  namespace: memorang
  labels:
    app: memorang-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: memorang-backend
  template:
    metadata:
      labels:
        app: memorang-backend
    spec:
      imagePullSecrets:
        - name: acr-secret
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: memorang-backend
          image: tickertom.azurecr.io/memorang-backend:dev-ai
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: doppler-tokens
                  key: BACKEND_DOPPLER_TOKEN
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
