apiVersion: apps/v1
kind: Deployment
metadata:
  name: memorang-backend-deploy-prod
  labels:
    app: memorang-backend-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: memorang-backend-prod
  template:
    metadata:
      labels:
        app: memorang-backend-prod
    spec:
      nodeSelector:
        node-type: regular
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: memorang-backend-prod
        image: tickertom.azurecr.io/memorang-backend:latest
        imagePullPolicy: Always
        command:
        - doppler
        - run
        - --preserve-env=TEMPORAL_ADDRESS,TEMPORAL_NAMESPACE,TEMPORAL_TASK_QUEUE
        - --
        - node
        - dist/main
        env:
        - name: DOPPLER_TOKEN
          valueFrom:
            secretKeyRef:
              name: doppler-tokens
              key: BACKEND_DOPPLER_TOKEN
        - name: NODE_ENV
          value: production
        - name: HOME
          value: /tmp
        - name: PORT
          value: "3001"
        - name: TEMPORAL_ADDRESS
          value: temporal:7233
        - name: TEMPORAL_NAMESPACE
          value: default
        - name: TEMPORAL_TASK_QUEUE
          value: document-ingestion
        ports:
        - containerPort: 3001
          name: mem-api-port
