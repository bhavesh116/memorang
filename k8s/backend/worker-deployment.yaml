apiVersion: apps/v1
kind: Deployment
metadata:
  name: memorang-worker
  namespace: memorang
  labels:
    app: memorang-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memorang-worker
  template:
    metadata:
      labels:
        app: memorang-worker
    spec:
      imagePullSecrets:
        - name: acr-secret
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: memorang-worker
          image: tickertom.azurecr.io/memorang-backend:dev-ai
          imagePullPolicy: Always
          command: ["doppler", "run", "--", "node", "dist/temporal/worker"]
          env:
            - name: DOPPLER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: doppler-tokens
                  key: WORKER_DOPPLER_TOKEN
            - name: NODE_ENV
              value: production
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
