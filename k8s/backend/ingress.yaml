apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memorang-backend
  namespace: memorang
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "52m"        # allow 50MB PDF uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.memorang.io"
spec:
  ingressClassName: nginx
  rules:
    - host: api.memorang.io   # ← update with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memorang-backend
                port:
                  number: 80
  tls:
    - hosts:
        - api.memorang.io
      secretName: backend-tls
