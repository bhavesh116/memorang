# ============================================================
# Doppler service tokens — DO NOT commit real values.
#
# Setup:
#   cp k8s/secrets/doppler-tokens.example.yaml k8s/secrets/doppler-tokens.yaml
#   # edit with real dp.st.* tokens from Doppler dashboard
#   kubectl apply -f k8s/secrets/doppler-tokens.yaml
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: doppler-tokens
type: Opaque
stringData:
  FRONTEND_DOPPLER_TOKEN: "dp.st.example_frontend_token"
  BACKEND_DOPPLER_TOKEN: "dp.st.example_backend_token"
  WORKER_DOPPLER_TOKEN: "dp.st.example_worker_token"
